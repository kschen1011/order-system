<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>半吊子廚房｜團購下單</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{--bg:#F7F3EE;--surface:#FFF;--accent:#C4622D;--ah:#A84E20;--green:#3D7848;--red:#C0392B;--amber:#A07010;--purple:#5B3F9A;--text:#1C1008;--muted:#7A6A5A;--border:#E0D8CF}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
h1,h2,h3{font-family:'Noto Serif TC',serif}
.wrap{max-width:680px;margin:0 auto;padding:16px}
.hdr{text-align:center;padding:24px 16px 18px;border-bottom:1px solid var(--border);margin-bottom:18px}
.hdr .brand{font-size:12px;letter-spacing:3px;color:var(--accent);font-weight:600;margin-bottom:5px}
.hdr h1{font-size:21px;font-weight:700}
.hdr .sub{font-size:14px;color:var(--text);margin-top:10px;text-align:left;line-height:1.8}
.card{background:var(--surface);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:600;transition:background .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover:not(:disabled){background:var(--ah)}
.btn-s{background:transparent;border:1.5px solid var(--accent);color:var(--accent)}.btn-s:hover:not(:disabled){background:#f9ede7}
.btn-g{background:var(--green);color:#fff}.btn-g:hover:not(:disabled){background:#2f5e38}
.btn-d{background:var(--red);color:#fff}.btn-d:hover:not(:disabled){background:#a93226}
.btn-ghost{background:transparent;color:var(--muted);font-weight:500}.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:7px 13px;font-size:13px}
.btn-block{width:100%;display:flex}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:14px;background:#fff;color:var(--text);transition:border-color .15s}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:70px}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600}
.ba{background:#fbe9e0;color:var(--accent)}.bg{background:#e6f2e8;color:var(--green)}
.br{background:#fde9e7;color:var(--red)}.bam{background:#fdf3dc;color:var(--amber)}
.bp{background:#ede9f7;color:var(--purple)}.bgr{background:#f0ece8;color:var(--muted)}
.pcard{border:1.5px solid var(--border);border-radius:14px;padding:15px;margin-bottom:10px;background:var(--surface)}
.pcard.full{opacity:.55}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.pname{font-size:15px;font-weight:700;font-family:'Noto Serif TC',serif}
.pprice{font-size:15px;font-weight:700;color:var(--accent)}
.pdesc{font-size:13px;color:var(--muted);margin-bottom:9px}
.qty{display:flex;align-items:center;gap:11px}
.qb{width:33px;height:33px;border-radius:50%;border:none;cursor:pointer;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s}
.qb:disabled{opacity:.35;cursor:not-allowed}
.qm{background:#f0ece8;color:var(--text)}.qm:hover:not(:disabled){background:#e0d8cf}
.qp{background:var(--accent);color:#fff}.qp:hover:not(:disabled){background:var(--ah)}
.qn{font-size:16px;font-weight:700;min-width:22px;text-align:center}
.vrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid var(--bg)}
.vname{font-size:13px;color:var(--text)}
.pbg{background:#f0ece8;border-radius:100px;height:7px;overflow:hidden}
.pfill{height:100%;border-radius:100px;background:var(--accent);transition:width .3s}
.pfill.f{background:var(--red)}.pfill.l{background:var(--amber)}
.ptxt{font-size:12px;color:var(--muted);margin-top:3px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.scard{background:var(--surface);border-radius:14px;padding:14px;text-align:center}
.snum{font-size:22px;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--accent)}
.slbl{font-size:12px;color:var(--muted);margin-top:2px}
.orow{border:1.5px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px}
.oh{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.oname{font-size:14px;font-weight:700}
.ototal{font-size:14px;font-weight:700;color:var(--accent)}
.oitems{font-size:13px;color:var(--muted);line-height:1.75}
.onote{font-size:12px;color:var(--amber);margin-top:4px}
.oacts{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:#f0ece8;border-radius:10px;padding:4px;margin-bottom:14px}
.tab{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.tab.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nav{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.nb{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;background:#f0ece8;color:var(--muted);transition:all .15s}
.nb.on{background:var(--accent);color:#fff}
.pi{display:flex;align-items:center;justify-content:space-between;padding:12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px}
.pi.done{opacity:.5;text-decoration:line-through}
.divider{height:1px;background:var(--border);margin:14px 0}
.stitle{font-size:16px;font-weight:700;margin-bottom:11px;font-family:'Noto Serif TC',serif}
.alert{padding:11px 15px;border-radius:10px;font-size:13px;margin-bottom:13px}
.alert-am{background:#fdf3dc;color:var(--amber);border:1px solid #f0d98a}
.alert-g{background:#e6f2e8;color:var(--green);border:1px solid #a8d5ae}
.alert-r{background:#fde9e7;color:var(--red);border:1px solid #f0aaaa}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:14px}
.links{text-align:center;padding:18px 0 6px;display:flex;justify-content:center;gap:16px}
.links a{font-size:13px;color:var(--muted);text-decoration:none;cursor:pointer}.links a:hover{color:var(--accent)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:20px;padding:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mtitle{font-size:17px;font-weight:700;margin-bottom:15px;font-family:'Noto Serif TC',serif}
.pedit{border:1.5px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px}
.ctbl{width:100%;border-collapse:collapse}
.ctbl td{padding:8px 4px;font-size:14px;border-bottom:1px solid var(--bg)}
.ctbl td:last-child{text-align:right;font-weight:600}
.ctot{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding:11px 4px;border-top:2px solid var(--border);margin-top:4px}
.pwpage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.pwcard{background:var(--surface);border-radius:20px;padding:30px 26px;width:100%;max-width:370px;text-align:center}
.pwbrand{font-size:12px;letter-spacing:3px;color:var(--accent);font-weight:600;margin-bottom:7px}
.pwtitle{font-size:19px;font-weight:700;margin-bottom:5px}
.pwsub{font-size:13px;color:var(--muted);margin-bottom:22px}
/* history */
.hcard{border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;background:var(--surface)}
.hcard.current{border-color:var(--accent);border-width:2px}
.hcard-title{font-size:15px;font-weight:700;font-family:'Noto Serif TC',serif}
.htbl{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.htbl th{background:#f7f0e8;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
.htbl td{padding:7px 10px;border-bottom:1px solid #f5f0eb}
/* product list in history */
.plist{background:var(--bg);border-radius:10px;padding:12px;margin-top:10px}
.plist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e8e0d5;font-size:13px}
.plist-item:last-child{border-bottom:none}
/* two-grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
